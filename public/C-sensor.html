<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Já Ismaga -Cadastro Sensores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles/style.css">
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <nav id="sidebar" class="col-md-3 col-lg-2 d-md-block sidebar collapse min-vh-100 p-0">
            <div class="position-sticky pt-3">
                <div class="text-center py-4">
                    <h3 class="fw-bold text-white">Já Ismaga</h3>
                    <small class="text-white-50">Painel de Controle</small>
                </div>
                
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link active" href="home.html">
                            <i class="fa-solid fa-house me-2"></i> Início
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="usuario.html">
                            <i class="fa-solid fa-users me-2"></i> Usuários
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="Sensores.html">
                            <i class="fa-solid fa-train me-2"></i> Sensores
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-danger mt-5" href="../index.html">
                            <i class="fa-solid fa-right-from-bracket me-2"></i> Sair da Conta
                        </a>
                    </li>
                </ul>
            </div>
        </nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div
                    class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom">
                    <h1 class="h2 fw-bold" style="color: var(--azul-ismaga);">Novo Dispositivo IoT</h1>
                </div>

                <div class="row justify-content-center">
                    <div class="col-lg-8">
                        <div class="form-container">
                            <h4 class="mb-4 fw-bold text-dark">Cadastro de Ativo / Sensor</h4>

                            <form action="#" method="POST">
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="nomeSensor" class="form-label fw-semibold">Nome do Sensor</label>
                                        <input type="text" class="form-control" id="nomeSensor" name="nome_sensor"
                                            placeholder="Ex: Sensor de Presença Curva A" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="idSensor" class="form-label fw-semibold">Código de Identificação
                                            (ID)</label>
                                        <input type="text" class="form-control" id="idSensor" name="id_sensor"
                                            placeholder="Ex: SNS-RFID-01" required>
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="tipoSensor" class="form-label fw-semibold">Tipo de Sensor</label>
                                        <select class="form-select" id="tipoSensor" name="tipo_sensor" required>
                                            <option value="" selected disabled>Selecione o tipo...</option>
                                            <option value="presenca">Presença / Passagem (RFID/Infravermelho)</option>
                                            <option value="velocidade">Velocímetro (Telemetria)</option>
                                            <option value="corrente">Consumo / Corrente Elétrica</option>
                                            <option value="fim-curso">Fim de Curso (Chaves de desvio)</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="localizacaoSensor" class="form-label fw-semibold">Localização na
                                            Malha</label>
                                        <input type="text" class="form-control" id="localizacaoSensor"
                                            name="localizacao_sensor" placeholder="Ex: Setor Sul - Agulha 3" required>
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <label for="descricaoSensor" class="form-label fw-semibold">Descrição/Notas de
                                        Manutenção Preditiva</label>
                                    <textarea class="form-control" id="descricaoSensor" name="descricao_sensor" rows="3"
                                        placeholder="Informações adicionais sobre calibração ou hardware..."></textarea>
                                </div>

                                <div class="d-flex gap-2 justify-content-end">
                                    <a href="sensores.html" class="btn btn-secondary px-4 fw-semibold">Cancelar</a>
                                    <button type="submit" class="btn btn-ismaga px-4">Salvar Sensor</button>
                                </div>
                            </form>

                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
