<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container d-flex align-items-center justify-content-center vh-100">
        <div class="row w-100 justify-content-center">
            <div class="col-12 col-sm-8 col-md-6 col-lg-4">

                <div class="card shadow border-0 p-4">
                     <div class="card-body">

                      <div class="text-center">
                            <h2 class="fw-bold text-dark">Cadastre-se</h2>


 <form id="formCadastro">
    <br>
    <label for="nome">Nome Completo:</label>
    <input type="text" id="nome" placeholder="Digite seu nome" required>
    <br>
    <br>
    <label for="email">Email:</label>
    <input type="email" id="email" placeholder="Digite seu email" required>
    <br>
    <br>
    <label for="idade">Idade:</label>
    <input type="text" id="idade" placeholder="Digite sua idade" required>
    <br>
    <br>
    <label for="peso">Peso:</label>
    <input type="text" id="peso" placeholder="Digite seu peso" required>
    <br>
    <br>
    <label for="telefone">Telefone:</label>
    <input type="number" id="telefone" placeholder="Digite seu telefone" required>
    <br>
    <br>
    <label for="cidade">Cidade:</label>
    <input type="text" id="cidade" placeholder="Digite sua cidade" required>
    <br>
    <br>
    <label for="estado">Estado:</label>
    <input type="text" id="estado" placeholder="Digite seu estado" required>
    <br>
    <br>

    <button type="submit">Enviar</button>
    </form>

    </body>
    </html>
