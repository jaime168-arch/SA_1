<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Já Ismaga</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles/style.css">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 15px; }
        .btn-primary { background-color: #007bff; border: none; transition: 0.3s; }
        .btn-primary:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <main class="container d-flex align-items-center justify-content-center vh-100">
        <div class="row w-100 justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-5">

                <div class="card shadow-lg border-0 p-4">
                    <div class="card-body">
                        
                        <div class="text-center mb-4">
                            <h2 class="fw-bold text-dark">Criar Conta</h2>
                            <p class="text-muted">Cadastre-se na Já Ismaga</p>
                        </div>

                        <form id="formCadastro">
                            <div class="mb-3">
                                <label for="nome" class="form-label fw-semibold">Nome Completo</label>
                                <input type="text" class="form-control" id="nome" placeholder="Ex: João Silva" required>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label fw-semibold">E-mail</label>
                                <input type="email" class="form-control" id="email" placeholder="nome@exemplo.com" required>
                            </div>

                            <div class="mb-3">
                                <label for="telefone" class="form-label fw-semibold">Telefone</label>
                                <input type="tel" class="form-control" id="telefone" placeholder="(00) 00000-0000" required>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="senha" class="form-label fw-semibold">Senha</label>
                                    <input type="password" class="form-control" id="senha" placeholder="********" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="senhaConfirm" class="form-label fw-semibold">Confirmar Senha</label>
                                    <input type="password" class="form-control" id="senhaConfirm" placeholder="********" required>
                                </div>
                            </div>

                            <div class="d-grid gap-2 mt-3">
                                <button type="submit" class="btn btn-primary btn-lg">Cadastrar</button>
                            </div>

                            <div class="text-center mt-4">
                                <span class="text-muted">Já tem uma conta?</span> 
                                <a href="login.html" class="text-decoration-none fw-bold">Faça Login</a>
                            </div>
                        </form>

                    </div>
                </div>

            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
