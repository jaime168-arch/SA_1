<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | + Já.Ismaga</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body, html {
            height: 100%;
        }
        .main-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .login-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="bg-light">

    <div class="main-container">
        <nav class="navbar navbar-dark bg-primary shadow-sm">
            <div class="container">
                <h2 class="navbar-brand mb-0"><strong>+ Já</strong>.Ismaga</h2>
            </div>
        </nav>
    
        <div class="login-wrapper">
            <div class="container">
                <div class="row justify-content-center w-100 m-0">
                    <div class="col-12 col-sm-8 col-md-6 col-lg-4">
                        
                        <div class="card shadow border-0 p-4">
                            <div class="card-body">
                                <div class="text-center mb-4">
                                    <h2 class="fw-bold text-dark">Login</h2>
                                    <p class="text-muted small">Acesse sua conta para continuar</p>
                                </div>

                                <form action="home.html" method="GET">
                                    <div class="mb-3">
                                        <label for="email" class="form-label fw-semibold">E-mail</label>
                                        <input type="email" class="form-control" id="email" placeholder="exemplo@email.com" required>
                                    </div>

                                    <div class="mb-3">
                                        <label for="password" class="form-label fw-semibold">Senha</label>
                                        <input type="password" class="form-control" id="password" placeholder="Digite sua senha" required>
                                    </div>
                                    
                                    <div class="d-grid gap-2 mb-3">
                                        <button type="submit" class="btn btn-primary">Entrar</button>
                                    </div>
                                </form>

                                <div class="text-center mt-3">
                                    <small class="text-muted">Não tem conta?
