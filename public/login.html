<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light"> 

    <main class="container d-flex align-items-center justify-content-center vh-100">
        <div class="row w-100 justify-content-center">
            <div class="col-12 col-sm-8 col-md-6 col-lg-4">

                <div class="card shadow border-0 p-4">
                     <div class="card-body">

                      <div class="text-center">
                            <h2 class="fw-bold text-dark">Bem vindo à Já ismaga</h2>
                        </div>

                        <form>
                            <div class="mb-3">
                                <label for="email" class="form-label fw-semibold">E-mail</label>
                                <input type="email" class="form-control" id="email" placeholder="Digite seu email" required>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label fw-semibold">Senha</label>
                                <input type="password" class="form-control" id="password" placeholder="Digite a Senha" required>
                            </div>

                            <div class="text-end">
                                <a href="#" class="text-decoration-none small">Esqueceu a senha?</a>
                            </div>
                            
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary btn-lg">Entrar</button>
                            </div>
                        </form>

                        <div class="text-center">
                           <small>Não tem conta? <a href="cadastro.html">Cadastre-se</a></small>
                        </div>
                   
                
            </div>
        </div>
        
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
